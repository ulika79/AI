<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AI视频变现学徒 · 入学摸底表</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 20px 15px 40px;
      color: #2c3e50;
      line-height: 1.6;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      overflow: hidden;
      padding: 30px 22px 40px;
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .header .sub {
      color: #64748b;
      font-size: 15px;
      font-weight: 400;
      margin-top: 4px;
    }
    .section {
      margin-bottom: 28px;
      border-bottom: 1px solid #f0f0f0;
      padding-bottom: 8px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title span.icon { font-size: 20px; }
    .field { margin-bottom: 22px; }
    label.q-title {
      display: block;
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 10px;
      color: #0f172a;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      font-size: 15px;
      background: #fafbfc;
      transition: all 0.2s;
      outline: none;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: #818cf8;
      background: white;
      box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .option-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #f8fafc;
      border-radius: 14px;
      padding: 12px 14px;
      border: 1.5px solid transparent;
      transition: 0.2s;
      cursor: pointer;
      font-size: 15px;
    }
    .option-item:hover { background: #f1f5f9; }
    .option-item input {
      margin-top: 2px;
      accent-color: #4f46e5;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .option-item label { cursor: pointer; flex: 1; color: #334155; }
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      margin-top: 20px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 20px rgba(79,70,229,0.25);
    }
    .btn-submit:active { transform: scale(0.97); }
    .btn-submit:disabled { opacity: 0.6; pointer-events: none; background: #94a3b8; }
    .btn-copy {
      width: 100%;
      padding: 14px;
      background: #10b981;
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      margin-top: 12px;
      cursor: pointer;
      display: none;
    }
    .btn-copy:active { transform: scale(0.97); }
    .result-box {
      margin-top: 20px;
      background: #f0fdf4;
      border-radius: 16px;
      padding: 18px;
      border: 1px solid #bbf7d0;
      font-size: 14px;
      color: #166534;
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .status-message {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      font-weight: 500;
    }
    .status-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .status-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .required-star { color: #ef4444; font-weight: bold; margin-left: 2px; }
    .guide-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #1e40af;
      line-height: 1.8;
    }
    .guide-box span { font-weight: 700; }
    @media (max-width: 480px) {
      .container { padding: 20px 16px 30px; }
      .header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎬 AI视频变现学徒</h1>
    <div class="sub">入学摸底表 · 认真填写，定制你的学习方案</div>
  </div>

  <div class="guide-box">
    <span>📌 填写说明：</span><br>
    1. 请认真填写以下所有问题<br>
    2. 填写完成后点击 <span>"生成档案"</span><br>
    3. 再点击 <span>"一键复制结果"</span><br>
    4. <span>粘贴发送给老师</span> 即可完成
  </div>

  <!-- 基础画像 -->
  <div class="section">
    <div class="section-title"><span class="icon">📋</span> 基础画像</div>

    <div class="field">
      <label class="q-title">1. 你的昵称/微信号<span class="required-star">*</span></label>
      <input type="text" id="q1" placeholder="例如：小明 / wxid_abc" required>
    </div>

    <div class="field">
      <label class="q-title">2. 你的年龄是？<span class="required-star">*</span></label>
      <input type="text" id="q_age" placeholder="例如：28" required>
    </div>

    <div class="field">
      <label class="q-title">3. 你所在的城市是？<span class="required-star">*</span></label>
      <input type="text" id="q_city" placeholder="例如：成都" required>
    </div>

    <div class="field">
      <label class="q-title">4. 目前的主业状态是？<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="radio" name="q2" value="A. 在校学生"><label>A. 在校学生</label></div>
        <div class="option-item"><input type="radio" name="q2" value="B. 全职上班族（想搞副业）"><label>B. 全职上班族（想搞副业）</label></div>
        <div class="option-item"><input type="radio" name="q2" value="C. 自由职业/创业者"><label>C. 自由职业/创业者</label></div>
        <div class="option-item"><input type="radio" name="q2" value="D. 待业中，急需赚钱"><label>D. 待业中，急需赚钱</label></div>
      </div>
    </div>

    <div class="field">
      <label class="q-title">5. 你目前的月均收入大概在？<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="radio" name="q3" value="A. 暂无稳定收入"><label>A. 暂无稳定收入</label></div>
        <div class="option-item"><input type="radio" name="q3" value="B. 3000元以下"><label>B. 3000元以下</label></div>
        <div class="option-item"><input type="radio" name="q3" value="C. 3000-8000元"><label>C. 3000-8000元</label></div>
        <div class="option-item"><input type="radio" name="q3" value="D. 8000-15000元"><label>D. 8000-15000元</label></div>
        <div class="option-item"><input type="radio" name="q3" value="E. 15000元以上"><label>E. 15000元以上</label></div>
      </div>
    </div>
  </div>

  <!-- 技能与设备 -->
  <div class="section">
    <div class="section-title"><span class="icon">🛠️</span> 技能与设备</div>

    <div class="field">
      <label class="q-title">6. 你对AI工具的熟悉程度是？<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="radio" name="q4" value="A. 完全小白，听说过但没用过"><label>A. 完全小白，听说过但没用过</label></div>
        <div class="option-item"><input type="radio" name="q4" value="B. 用过ChatGPT等文字工具，没做过视频"><label>B. 用过ChatGPT等文字工具，没做过视频</label></div>
        <div class="option-item"><input type="radio" name="q4" value="C. 用过AI绘画/生视频（如Midjourney、Sora类）"><label>C. 用过AI绘画/生视频（如Midjourney、Sora类）</label></div>
        <div class="option-item"><input type="radio" name="q4" value="D. 已经能熟练用AI产出完整视频"><label>D. 已经能熟练用AI产出完整视频</label></div>
      </div>
    </div>

    <div class="field">
      <label class="q-title">7. 你现在手头有什么设备？（多选）<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="checkbox" name="q5" value="一台普通手机"><label>一台普通手机</label></div>
        <div class="option-item"><input type="checkbox" name="q5" value="旗舰手机或平板"><label>旗舰手机或平板</label></div>
        <div class="option-item"><input type="checkbox" name="q5" value="配置还可以的电脑"><label>配置还可以的电脑</label></div>
        <div class="option-item"><input type="checkbox" name="q5" value="高性能电脑（显卡不错）"><label>高性能电脑（显卡不错）</label></div>
      </div>
    </div>

    <div class="field">
      <label class="q-title">8. 你做过最接近"视频变现"的一件事是？<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="radio" name="q6" value="A. 完全没做过，零基础"><label>A. 完全没做过，零基础</label></div>
        <div class="option-item"><input type="radio" name="q6" value="B. 发过短视频，没收入"><label>B. 发过短视频，没收入</label></div>
        <div class="option-item"><input type="radio" name="q6" value="C. 尝试过剪映/PR，偶尔接点小单"><label>C. 尝试过剪映/PR，偶尔接点小单</label></div>
        <div class="option-item"><input type="radio" name="q6" value="D. 靠视频赚到过钱，想用AI放大"><label>D. 靠视频赚到过钱，想用AI放大</label></div>
      </div>
    </div>
  </div>

  <!-- 学习动机与执行 -->
  <div class="section">
    <div class="section-title"><span class="icon">🎯</span> 学习动机与执行</div>

    <div class="field">
      <label class="q-title">9. 你为什么会想学"AI视频变现"？（多选）<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="checkbox" name="q7" value="看好AI趋势，想提前占个坑"><label>看好AI趋势，想提前占个坑</label></div>
        <div class="option-item"><input type="checkbox" name="q7" value="想快速搞钱，最好这个月就见收益"><label>想快速搞钱，最好这个月就见收益</label></div>
        <div class="option-item"><input type="checkbox" name="q7" value="有一份空闲时间，想做个副业"><label>有一份空闲时间，想做个副业</label></div>
        <div class="option-item"><input type="checkbox" name="q7" value="想系统学会一个技能，长期吃这碗饭"><label>想系统学会一个技能，长期吃这碗饭</label></div>
        <div class="option-item"><input type="checkbox" name="q7" value="看别人赚到了，我来试试水"><label>看别人赚到了，我来试试水</label></div>
      </div>
    </div>

    <div class="field">
      <label class="q-title">10. 你打算每天有多少时间投入到学习和实操上？<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="radio" name="q8" value="A. 不确定，有空就弄"><label>A. 不确定，有空就弄</label></div>
        <div class="option-item"><input type="radio" name="q8" value="B. 半小时以内"><label>B. 半小时以内</label></div>
        <div class="option-item"><input type="radio" name="q8" value="C. 1-2小时"><label>C. 1-2小时</label></div>
        <div class="option-item"><input type="radio" name="q8" value="D. 2小时以上，能坚持高强度"><label>D. 2小时以上，能坚持高强度</label></div>
      </div>
    </div>

    <div class="field">
      <label class="q-title">11. 如果让你独立完成一个视频，你当下最怕什么？<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="radio" name="q9" value="A. 找不到选题，脑子空白"><label>A. 找不到选题，脑子空白</label></div>
        <div class="option-item"><input type="radio" name="q9" value="B. 操作太复杂，没人一步步带就会卡住"><label>B. 操作太复杂，没人一步步带就会卡住</label></div>
        <div class="option-item"><input type="radio" name="q9" value="C. 做出来没流量，不知道怎么变现"><label>C. 做出来没流量，不知道怎么变现</label></div>
        <div class="option-item"><input type="radio" name="q9" value="D. 不怕，愿意磨，缺的是变现闭环"><label>D. 不怕，愿意磨，缺的是变现闭环</label></div>
      </div>
    </div>
  </div>

  <!-- 价值认知与付费意愿 -->
  <div class="section">
    <div class="section-title"><span class="icon">💡</span> 价值认知与学习偏好</div>

    <div class="field">
      <label class="q-title">12. 以前为了学一个能赚钱的技能，你做过最大的一笔投入是？<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="radio" name="q10" value="A. 基本没花过钱，习惯全网找免费资源"><label>A. 基本没花过钱，习惯全网找免费资源</label></div>
        <div class="option-item"><input type="radio" name="q10" value="B. 花过几十上百块买过课，但没学完"><label>B. 花过几十上百块买过课，但没学完</label></div>
        <div class="option-item"><input type="radio" name="q10" value="C. 花过几百到上千参加过训练营/社群"><label>C. 花过几百到上千参加过训练营/社群</label></div>
        <div class="option-item"><input type="radio" name="q10" value="D. 投入过数千元以上，而且觉得值"><label>D. 投入过数千元以上，而且觉得值</label></div>
      </div>
    </div>

    <div class="field">
      <label class="q-title">13. 你觉得"AI视频变现"这个技能，哪点最吸引你？<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="radio" name="q11" value="A. 不用露脸、不用拍摄，门槛极低"><label>A. 不用露脸、不用拍摄，门槛极低</label></div>
        <div class="option-item"><input type="radio" name="q11" value="B. 可以用AI批量化生产，放大收益"><label>B. 可以用AI批量化生产，放大收益</label></div>
        <div class="option-item"><input type="radio" name="q11" value="C. 技术新，竞争小，正好有红利"><label>C. 技术新，竞争小，正好有红利</label></div>
        <div class="option-item"><input type="radio" name="q11" value="D. 能帮我解决现在项目里卡脖子的技术问题"><label>D. 能帮我解决现在项目里卡脖子的技术问题</label></div>
      </div>
    </div>

    <div class="field">
      <label class="q-title">14. 假设有一个深度带教能带你拿到结果，你更倾向哪种模式？<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="radio" name="q12" value="A. 有免费群或公开课，靠自己去问去悟"><label>A. 有免费群或公开课，靠自己去问去悟</label></div>
        <div class="option-item"><input type="radio" name="q12" value="B. 付一个自己能承受的小钱，买断靠谱的录播课"><label>B. 付一个自己能承受的小钱，买断靠谱的录播课</label></div>
        <div class="option-item"><input type="radio" name="q12" value="C. 愿意付费进入有老师1对1答疑的社群，少走弯路"><label>C. 愿意付费进入有老师1对1答疑的社群，少走弯路</label></div>
        <div class="option-item"><input type="radio" name="q12" value="D. 只要真能出结果，哪怕分期也愿意投入，时间成本更贵"><label>D. 只要真能出结果，哪怕分期也愿意投入，时间成本更贵</label></div>
      </div>
    </div>

    <div class="field">
      <label class="q-title">15. 如果一个你比较信任的人，给你推一个靠谱的AI视频变现付费服务，你第一反应是？<span class="required-star">*</span></label>
      <div class="options">
        <div class="option-item"><input type="radio" name="q13" value="A. 先看看多少钱，太贵就找找有没有免费渠道"><label>A. 先看看多少钱，太贵就找找有没有免费渠道</label></div>
        <div class="option-item"><input type="radio" name="q13" value="B. 想办法找找拼课、盗版或者几个人凑一份"><label>B. 想办法找找拼课、盗版或者几个人凑一份</label></div>
        <div class="option-item"><input type="radio" name="q13" value="C. 先观望，等看到别人真有结果再跟"><label>C. 先观望，等看到别人真有结果再跟</label></div>
        <div class="option-item"><input type="radio" name="q13" value="D. 了解价值后，觉得对自己有用就会考虑付费"><label>D. 了解价值后，觉得对自己有用就会考虑付费</label></div>
      </div>
    </div>
  </div>

  <!-- 开放问题 -->
  <div class="section">
    <div class="section-title"><span class="icon">✍️</span> 最后一步</div>
    <div class="field">
      <label class="q-title">16. 用一句话告诉我，你的困境或最想达到的目标是什么？<span class="required-star">*</span></label>
      <textarea id="q14" rows="3" placeholder="例如：想每月多赚3000块，摆脱死工资..."></textarea>
    </div>
  </div>

  <button id="submitBtn" class="btn-submit" onclick="generateResult()">📋 生成档案</button>
  <button id="copyBtn" class="btn-copy" onclick="copyResult()">📋 一键复制结果，发送给老师</button>
  
  <div id="statusMessage" class="status-message"></div>
  <div id="resultBox" class="result-box"></div>
</div>

<script>
  let resultText = '';

  function getRadio(name) {
    const r = document.querySelector(`input[name="${name}"]:checked`);
    return r ? r.value : '';
  }

  function getCheckbox(name) {
    const c = document.querySelectorAll(`input[name="${name}"]:checked`);
    return Array.from(c).map(x => x.value).join('、') || '';
  }

  function generateResult() {
    const q1 = document.getElementById('q1').value.trim();
    const qAge = document.getElementById('q_age').value.trim();
    const qCity = document.getElementById('q_city').value.trim();
    const q14 = document.getElementById('q14').value.trim();

    if (!q1) return show('请填写昵称/微信号', 'error');
    if (!qAge) return show('请填写年龄', 'error');
    if (!qCity) return show('请填写城市', 'error');

    const radios = ['q2','q3','q4','q6','q8','q9','q10','q11','q12','q13'];
    for (let n of radios) {
      if (!getRadio(n)) return show('请完成所有单选题', 'error');
    }
    if (!getCheckbox('q5')) return show('请至少选一项设备', 'error');
    if (!getCheckbox('q7')) return show('请至少选一项学习动机', 'error');
    if (!q14) return show('请填写最后一题', 'error');

    resultText = `--- AI视频学徒摸底档案 ---
昵称/微信号：${q1}
年龄：${qAge}
城市：${qCity}
主业状态：${getRadio('q2')}
月均收入：${getRadio('q3')}
AI熟悉度：${getRadio('q4')}
现有设备：${getCheckbox('q5')}
视频变现经历：${getRadio('q6')}
学习动机：${getCheckbox('q7')}
每日投入时间：${getRadio('q8')}
最大障碍：${getRadio('q9')}
过往技能投入：${getRadio('q10')}
最吸引点：${getRadio('q11')}
带教偏好：${getRadio('q12')}

  async function copyResult() {
    try {
      await navigator.clipboard.writeText(resultText);
      show('✅ 已复制！请粘贴发送给老师', 'success');
    } catch(e) {
      const box = document.getElementById('resultBox');
      const range = document.createRange();
      range.selectNode(box);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      show('请手动复制上方文本框内容', 'error');
    }
  }

  function show(msg, type) {
    const el = document.getElementById('statusMessage');
    el.textContent = msg;
    el.className = 'status-message ' + (type === 'error' ? 'status-error' : 'status-success');
    el.style.display = 'block';
    if (type === 'success') setTimeout(() => el.style.display = 'none', 4000);
  }
